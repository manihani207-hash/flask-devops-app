version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies

  pre_build:
    commands:
      - echo Logging in to AWS ECR
      - aws ecr get-login-password --region ca-central-1 | docker login --username AWS --password-stdin 310533914732.dkr.ecr.ca-central-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t flask-app .
      - docker tag flask-app:latest 310533914732.dkr.ecr.ca-central-1.amazonaws.com/flask-app:latest

  post_build:
    commands:
      - echo Pushing Docker image
      - docker push 310533914732.dkr.ecr.ca-central-1.amazonaws.com/flask-app:latest

      #- echo Deploying to EC2
      #- ssh ec2-user@<EC2_PUBLIC_IP> "docker pull >.dkr.ecr.ca-central-1.amazonaws.com/flask-app:latest && docker stop flask-app || true && docker rm flask-app || true && docker run -d -p 80:5000 --name flask-app 310533914732.dkr.ecr.ca-central-1.amazonaws.com/flask-app:latest"



